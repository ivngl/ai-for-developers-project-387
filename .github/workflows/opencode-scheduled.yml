name: opencode-scheduled

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  audit:
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: write
      pull-requests: write
      issues: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Generate Prisma client
        run: npm run db:generate -w server
        env:
          DATABASE_URL: file:./dev.db

      - name: Build client
        run: npm run build -w client

      - name: Start production server
        run: |
          cd server && npx tsx src/index.ts &
          sleep 3
          curl --retry 5 --retry-connrefused http://localhost:3001/api/health
        env:
          PORT: 3001
          DATABASE_URL: file:./dev.db
          ADMIN_PASSWORD: admin123
          JWT_SECRET: test-secret-key

      - name: Run Lighthouse audit
        run: npx lhci collect
        continue-on-error: true

      - name: Generate HTML report from Lighthouse JSON
        run: |
          json_report=$(ls .lighthouseci/lhr-*.json 2>/dev/null | head -1)
          if [ -n "$json_report" ]; then
            npx -p lighthouse node -e "
              const fs = require('fs');
              const lh = require('lighthouse');
              const json = JSON.parse(fs.readFileSync('$json_report', 'utf8'));
              const html = lh.generateReport(json, 'html');
              fs.writeFileSync('lighthouse-report.html', html);
            "
          else
            echo "No JSON report found in .lighthouseci/"
            exit 1
          fi

      - name: Create issues for low scores
        run: |
          json_report=$(ls .lighthouseci/lhr-*.json 2>/dev/null | head -1)
          if [ -n "$json_report" ]; then
            node -e "
              const fs = require('fs');
              const r = JSON.parse(fs.readFileSync('$json_report', 'utf8'));
              const categories = r.categories;
              let created = 0;
              for (const [key, cat] of Object.entries(categories)) {
                if (cat.score < 0.9) {
                  const pct = Math.round(cat.score * 100);
                  const title = '[Lighthouse] ' + cat.title + ' score: ' + pct + '%';
                  const body = '## ' + cat.title + ' score dropped to ' + pct + '%\n\nThreshold: 90%\n\nSee the lighthouse-nightly-report artifact for full details.';
                  require('child_process').execSync(
                    'gh issue create --title \"' + title + '\" --body \"' + body.replace(/\"/g, '\\\\\"') + '\"',
                    { stdio: 'inherit' }
                  );
                  created++;
                }
              }
              if (created === 0) console.log('All scores >= 0.9, no issues created');
            "
          else
            echo "No JSON report found"
          fi
        env:
          GH_TOKEN: ${{ github.token }}

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: lighthouse-nightly-report
          path: .lighthouseci/
          retention-days: 7
