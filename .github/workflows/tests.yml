name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  e2e:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Generate Prisma client
        run: npm run db:generate -w server
        env:
          DATABASE_URL: file:./dev.db

      - name: Push Prisma schema
        run: npm run db:push -w server
        env:
          DATABASE_URL: file:./dev.db

      - name: Install Playwright chromium
        run: npx playwright install chromium

      - name: Start server
        run: |
          cd server && npx tsx src/index.ts &
          sleep 3
          curl --retry 5 --retry-delay 2 --retry-connrefused http://localhost:3001/api/health
        env:
          DATABASE_URL: file:./dev.db
          ADMIN_PASSWORD: admin123
          JWT_SECRET: test-secret-key
          WORK_HOURS_START: 9
          WORK_HOURS_END: 18

      - name: Start client
        run: |
          cd client && npx vite --host &
          sleep 2
          curl --retry 5 --retry-delay 2 --retry-connrefused -o /dev/null -w "%{http_code}" http://localhost:5173

      - name: Run e2e tests
        run: npm run test:e2e
        env:
          DATABASE_URL: file:./dev.db
          ADMIN_PASSWORD: admin123
          JWT_SECRET: test-secret-key
          WORK_HOURS_START: 9
          WORK_HOURS_END: 18

      - name: Cleanup
        if: always()
        run: kill $(lsof -t -i:3001) $(lsof -t -i:5173) 2>/dev/null || true

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-results
          path: test-results/
          retention-days: 3
